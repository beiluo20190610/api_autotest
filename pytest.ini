[pytest]
addopts = -v -s --alluredir=./allure-results --strict-markers
testpaths = testcases
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: 冒烟测试用例
    positive: 正向用例
    negative: 反向用例
    boundary: 边界用例
    high: 高优先级用例
    medium: 中优先级用例
    low: 低优先级用例
    skip_env: 当前环境暂跳过（Playwright 探针确认）
    scenario: 业务场景多接口串联用例
